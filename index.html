<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 我的书架 · BookNote</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FAFAF5;
            --card-bg: #FFFFFF;
            --text-primary: #2D2D2D;
            --text-secondary: #6B6B6B;
            --accent: #C4956A;
            --accent-light: #F5E6D3;
            --border: #E8E0D8;
            --tag-bg: #F5E6D3;
            --tag-text: #8B6D4E;
        }

        body {
            font-family: "Noto Serif SC", "Source Han Serif SC", "思源宋体", serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.8;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, var(--accent-light) 0%, var(--bg) 100%);
        }

        .header h1 {
            font-family: "Playfair Display", "Georgia", serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .stats {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-num {
            font-family: "Playfair Display", serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Book Grid */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            padding-left: 12px;
            border-left: 3px solid var(--accent);
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .book-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .book-card-inner {
            display: flex;
            padding: 20px;
            gap: 16px;
        }

        .book-cover {
            width: 90px;
            min-width: 90px;
            height: 130px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.1);
            background: var(--accent-light);
        }

        .book-cover-placeholder {
            width: 90px;
            min-width: 90px;
            height: 130px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent) 0%, #D4A574 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.1);
        }

        .book-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .book-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .book-author {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .book-rating {
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .book-date {
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .book-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .book-tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            background: var(--tag-bg);
            color: var(--tag-text);
            border-radius: 10px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        .empty-state .hint {
            font-size: 0.9rem;
            margin-top: 8px;
            opacity: 0.7;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            opacity: 0.7;
            border-top: 1px solid var(--border);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .book-grid { grid-template-columns: 1fr; }
            .stats { gap: 20px; }
            .stat-num { font-size: 1.5rem; }
        }

        @media print {
            .header { background: none; border-bottom: 2px solid #000; }
            .book-card { break-inside: avoid; border: 1px solid #ccc; }
            .footer { display: none; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>📚 我的书架</h1>
        <p>每一本书，都值得被认真记住</p>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-num" id="bookCount">0</div>
                <div class="stat-label">本书</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="quoteCount">0</div>
                <div class="stat-label">条金句</div>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">读书笔记</h2>
        <div class="book-grid" id="bookGrid">
            <!-- Books will be dynamically added here -->
        </div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="icon">📖</div>
            <p>书架还是空的</p>
            <p class="hint">在 WorkBuddy 中告诉我一本书的名字，我来帮你生成笔记</p>
        </div>
    </div>

    <footer class="footer">
        Generated by BookNote Skill · WorkBuddy
    </footer>

    <script>
        // Book data - updated by BookNote Skill when new notes are generated
        const books = [
            { title: "这就是ChatGPT", author: "[美] 斯蒂芬·沃尔弗拉姆", rating: 4.4, date: "2026-04-17", file: "《这就是ChatGPT》.html", cover: "", tags: ["人工智能", "ChatGPT", "神经网络", "Transformer"] }
        ];

        const grid = document.getElementById('bookGrid');
        const emptyState = document.getElementById('emptyState');
        const bookCount = document.getElementById('bookCount');
        const quoteCount = document.getElementById('quoteCount');

        bookCount.textContent = books.length;
        quoteCount.textContent = books.length * 15; // avg quotes per book

        if (books.length === 0) {
            emptyState.style.display = 'block';
        } else {
            books.forEach(book => {
                const card = document.createElement('a');
                card.className = 'book-card';
                card.href = book.file;

                const coverHtml = book.cover
                    ? `<img class="book-cover" src="${book.cover}" alt="${book.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="book-cover-placeholder" style="display:none">📖</div>`
                    : `<div class="book-cover-placeholder">📖</div>`;

                const stars = '★'.repeat(Math.round(book.rating / 2)) + '☆'.repeat(5 - Math.round(book.rating / 2));
                const tagsHtml = book.tags ? book.tags.map(t => `<span class="book-tag">${t}</span>`).join('') : '';

                card.innerHTML = `
                    <div class="book-card-inner">
                        ${coverHtml}
                        <div class="book-info">
                            <div class="book-title">${book.title}</div>
                            <div class="book-author">${book.author}</div>
                            <div class="book-rating">${stars} ${book.rating}</div>
                            <div class="book-date">${book.date}</div>
                            ${tagsHtml ? `<div class="book-tags">${tagsHtml}</div>` : ''}
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }
    </script>

</body>
</html>
